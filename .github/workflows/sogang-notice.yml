name: Sogang graduate notice bot

on:
  schedule:
    # GitHub cron uses UTC. 01:00/08:00 UTC = 10:00/17:00 KST.
    - cron: "0 1,8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sogang-grad-notice-bot
  cancel-in-progress: false

jobs:
  check-notices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest

      - name: Check Sogang notices
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python sogang_notice_bot.py

      - name: Commit updated notice state
        run: |
          if [ -z "$(git status --porcelain -- state/seen_notices.json)" ]; then
            echo "No notice state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen_notices.json
          git commit -m "Update Sogang notice state"
          git push
