name: Sogang graduate notice bot

on:
  schedule:
    # GitHub cron uses UTC. 08:45 UTC = 17:45 KST.
    - cron: "45 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sogang-grad-notice-bot
  cancel-in-progress: false

jobs:
  check-notices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest

      - name: Preflight Sogang notice fetch
        run: python sogang_notice_bot.py --dry-run

      - name: Validate Discord webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error title=Missing DISCORD_WEBHOOK_URL::Add a repository secret named DISCORD_WEBHOOK_URL in Settings > Secrets and variables > Actions."
            exit 1
          fi

          case "$DISCORD_WEBHOOK_URL" in
            https://discord.com/api/webhooks/*|https://discordapp.com/api/webhooks/*)
              echo "Discord webhook secret is configured."
              ;;
            *)
              echo "::error title=Invalid DISCORD_WEBHOOK_URL::The secret should be a Discord webhook URL. It was not printed for safety."
              exit 1
              ;;
          esac

      - name: Check Sogang notices
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SOGANG_NOTICE_SCHEDULED_RUN: ${{ github.event_name == 'schedule' }}
        run: python sogang_notice_bot.py

      - name: Commit updated notice state
        run: |
          if [ -z "$(git status --porcelain -- state/seen_notices.json)" ]; then
            echo "No notice state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen_notices.json
          git commit -m "Update Sogang notice state"
          git push
